<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />

  <!-- iOS: 홈画面アプリ化 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="筋トレ">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./favicon.ico">
  <link rel="stylesheet" href="./app.css">
  <title>筋トレログ</title>
</head>
<body>
  <header id="topBar" class="top">
    <div class="title">筋トレログ</div>

    <div class="row">
      <div id="splitTabs" class="seg" role="tablist" aria-label="split"></div>

      <button id="btnSettings" class="btn ghost">設定</button>
    </div>

    <div class="row">
      <div class="datebox">
        <label>日付</label>
        <input id="workDate" type="date">
      </div>

      <button id="btnCalendar" class="btn ghost">カレンダー</button>

      <button id="btnLoadTemplate" class="btn">テンプレ読込</button>
      <button id="btnSaveTemplate" class="btn ghost">今の内容をテンプレ保存</button>
    </div>

    <div class="templatenote">
      <strong>テンプレ読込</strong>＝その部位の定番メニューを入れる　/　<strong>今の内容をテンプレ保存</strong>＝今日の順番・セット数でその部位のテンプレを更新
    </div>

    <section class="toolbar quickbar">
      <button id="btnAddExercise" class="btn">＋ 種目追加</button>
      <button id="btnHistory" class="btn ghost">履歴</button>
      <button id="btnMaster" class="btn ghost">種目マスタ</button>
    </section>
  </header>

  <main class="main">

    <section id="cards" class="cards"></section>
  </main>

  <!-- Settings Modal -->
  <dialog id="dlgSettings" class="dlg">
    <form method="dialog" class="dlgbox">
      <h3>設定</h3>

      <div class="field">
        <label>重量単位</label>
        <div class="seg small">
          <button class="segbtn active" type="button" data-unit="kg">kg</button>
          <button class="segbtn" type="button" data-unit="lb">lb</button>
        </div>
        <div class="hint">保存は内部kg固定（表示/入力だけ切替）</div>
      </div>

      <div class="field">
        <label>バックアップ</label>
        <div class="row">
          <button id="btnExport" type="button" class="btn">JSON書き出し</button>
          <button id="btnExportCsv" type="button" class="btn ghost">CSV書き出し</button>
          <label class="btn ghost filebtn">
            JSON読み込み
            <input id="fileImport" type="file" accept="application/json" hidden>
          </label>
        </div>
        <div class="hint">書き出したJSONをDropboxへ保存 → 機種変更も復元OK</div>
      </div>

      <div class="field">
        <label>部位（追加・並び替え）</label>
        <div class="row">
          <input id="newSplitName" placeholder="例：肩 / 腕 / 有酸素" style="flex:1; min-width:180px;">
          <button id="btnAddSplit" type="button" class="btn">＋ 追加</button>
        </div>
        <div id="splitsList" class="picklist" style="margin-top:10px;"></div>
        <div class="hint">※削除しても過去データは消しません（選べなくなるだけ）</div>
      </div>

      <div class="hr"></div>

      <div class="field">
        <label>メーカー（登録）</label>
        <div class="row">
          <input id="newMakerName" placeholder="例：Hammer Strength / Life Fitness" style="flex:1; min-width:220px;">
          <button id="btnAddMaker" type="button" class="btn">＋ 追加</button>
        </div>
        <div id="makersList" class="picklist" style="margin-top:10px;"></div>
        <div class="hint">※ここで登録したメーカーを、各種目カードで選択できます</div>
      </div>

      <div class="hint" id="appVersion">Version: v13.1</div>

      <menu class="dlgmenu">
        <button class="btn ghost">閉じる</button>
      </menu>
    </form>
  </dialog>

  <!-- Picker Modal -->
  <dialog id="dlgPicker" class="dlg">
    <form method="dialog" class="dlgbox">
      <h3>種目を選択</h3>
      <div class="hint" id="pickCurrentSplitHint">現在の部位のみ表示</div>
      <input id="pickSearch" class="search" placeholder="検索（例：ベンチ）">
      <div id="pickList" class="picklist"></div>

      <menu class="dlgmenu">
        <button class="btn ghost">閉じる</button>
      </menu>
    </form>
  </dialog>

  <!-- Master Modal -->
  <dialog id="dlgMaster" class="dlg">
    <form method="dialog" class="dlgbox">
      <h3>種目マスタ</h3>
      <div class="row">
        <button id="btnNewMaster" type="button" class="btn">＋ 新規</button>
      </div>
      <div class="hint" id="masterFilterHint">現在の部位の種目を表示</div>
      <div id="masterList" class="picklist"></div>

      <menu class="dlgmenu">
        <button class="btn ghost">閉じる</button>
      </menu>
    </form>
  </dialog>

  <!-- Master Edit Modal -->
  <dialog id="dlgMasterEdit" class="dlg">
    <form method="dialog" class="dlgbox">
      <h3 id="masterEditTitle">種目編集</h3>

      <div class="field">
        <label>部位</label>
        <select id="meSplit"></select>
      </div>

      <div class="field">
        <label>種目名</label>
        <input id="meName" required>
      </div>

      <div class="row">
        <div class="field">
          <label>機材番号</label>
          <input id="meEqNo" placeholder="例：M-12">
        </div>
        <div class="field">
          <label>椅子/背中など設定</label>
          <input id="meSetup" placeholder="例：椅子5 / 背中3">
        </div>
      </div>

      <div class="field">
        <label>デフォルトコメント</label>
        <textarea id="meComment" rows="2" placeholder="例：肩下げ意識"></textarea>
      </div>

      <menu class="dlgmenu">
        <button id="btnMasterDelete" type="button" class="btn danger">削除</button>
        <button id="btnMasterSave" type="button" class="btn">保存</button>
        <button id="btnMasterCancel" type="button" class="btn ghost">キャンセル</button>
      </menu>
    </form>
  </dialog>

  <!-- History Modal -->
  <dialog id="dlgHistory" class="dlg">
    <form method="dialog" class="dlgbox">
      <h3>履歴</h3>
      <div class="hint">種目を選ぶと直近の内容を確認できます</div>
      <div id="historyBody" class="history"></div>
      <menu class="dlgmenu">
        <button class="btn ghost">閉じる</button>
      </menu>
    </form>
  </dialog>


  <!-- Calendar Modal -->
  <dialog id="dlgCalendar" class="dlg">
    <form method="dialog" class="dlgbox">
      <div class="calhead">
        <button id="btnCalPrev" type="button" class="btn ghost">‹</button>
        <div class="caltitle" id="calTitle">----</div>
        <button id="btnCalNext" type="button" class="btn ghost">›</button>
      </div>
      <div class="calweek">
        <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
      </div>
      <div id="calGrid" class="calgrid"></div>
      <div class="hint">色が付いた日＝記録あり</div>
      <menu class="dlgmenu">
        <button class="btn ghost">閉じる</button>
      </menu>
    </form>
  </dialog>


  <script>
    window.__appjs_loaded = false;
    setTimeout(()=>{
      if(!window.__appjs_loaded){
        alert("app.js が読み込めていないか、初期化で停止しています。\n\n1) URLが末尾 / 付きか確認\n2) ブラウザでページを更新\n3) 直らなければ URLの最後に ?nosw=1 を付けて開いてください（キャッシュ解除）");
      }
    }, 1500);
  </script>
  <script src="./app.js"></script>
</body>
</html>
